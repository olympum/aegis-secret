name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: macos-26

    steps:
      - name: Check out
        uses: actions/checkout@v5

      - name: Set up Swift
        uses: swift-actions/setup-swift@65540b95f51493d65f5e59e97dcef9629ddf11bf
        with:
          swift-version: "6.2"

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test
