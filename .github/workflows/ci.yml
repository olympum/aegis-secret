name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: macos-26

    steps:
      - name: Check out
        uses: actions/checkout@v5

      - name: Select latest stable Xcode
        run: |
          latest_xcode="$(find /Applications -maxdepth 1 -type d -name 'Xcode_*.app' ! -iname '*beta*' | sort -V | tail -1)"
          if [[ -z "$latest_xcode" ]]; then
            latest_xcode="$(find /Applications -maxdepth 1 -type d -name 'Xcode*.app' ! -iname '*beta*' | sort -V | tail -1)"
          fi
          if [[ -z "$latest_xcode" ]]; then
            echo "No stable Xcode installation found on runner" >&2
            exit 1
          fi
          echo "Using Xcode at $latest_xcode"
          sudo xcode-select -s "$latest_xcode"
          xcodebuild -version

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test
