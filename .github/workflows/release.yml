name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Git tag to release, for example v0.1.0
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    env:
      AEGIS_SECRET_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      AEGIS_SECRET_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      AEGIS_SECRET_NOTARY_PROFILE: AegisSecretReleaseCI
      AEGIS_SECRET_GITHUB_REPOSITORY: ${{ github.repository }}

    steps:
      - name: Check out
        uses: actions/checkout@v5

      - name: Select latest Xcode
        run: |
          latest_xcode="$(find /Applications -maxdepth 1 -type d -name 'Xcode*.app' | sort -V | tail -1)"
          if [[ -z "$latest_xcode" ]]; then
            echo "No Xcode installation found on runner" >&2
            exit 1
          fi
          echo "Using Xcode at $latest_xcode"
          sudo xcode-select -s "$latest_xcode"
          xcodebuild -version

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
        run: |
          security create-keychain -p "$RUNNER_TEMP" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$RUNNER_TEMP" build.keychain
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/developer-id.p12"
          security import "$RUNNER_TEMP/developer-id.p12" \
            -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/xcodebuild
          security list-keychains -d user -s build.keychain
          security default-keychain -d user -s build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "$RUNNER_TEMP" build.keychain

      - name: Write App Store Connect API key
        run: |
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}" > "$RUNNER_TEMP/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8"
          {
            echo "AEGIS_SECRET_ASC_API_KEY_PATH=$RUNNER_TEMP/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8"
            echo "AEGIS_SECRET_ASC_API_KEY_ID=${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}"
            echo "AEGIS_SECRET_ASC_API_ISSUER_ID=${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}"
          } >> "$GITHUB_ENV"

      - name: Store notarytool credentials
        env:
          APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.NOTARY_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "$AEGIS_SECRET_NOTARY_PROFILE" \
            --apple-id "$APPLE_ID" \
            --team-id "$AEGIS_SECRET_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"

      - name: Build, notarize, and package release
        run: ./scripts/release-binary.sh "$AEGIS_SECRET_RELEASE_TAG"

      - name: Create draft GitHub release
        run: ./scripts/create-github-release.sh "$AEGIS_SECRET_RELEASE_TAG"
